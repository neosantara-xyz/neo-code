name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'packages/web/**'
      - 'docs/**'
      - 'install.sh'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Copy install.sh to public
        run: cp install.sh packages/web/public/install.sh

      - name: Build
        run: npm run build --workspace @neosantara/web

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name neo-code-web --commit-dirty=true
          workingDirectory: packages/web
