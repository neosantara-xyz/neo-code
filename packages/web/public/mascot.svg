<svg xmlns="http://www.w3.org/2000/svg" width="256" height="208" viewBox="0 0 256 208" role="img" aria-label="Neo Kanci mascot">
  <rect width="256" height="208" fill="none"/>

  <g shape-rendering="crispEdges">

    <!-- KUPING KIRI -->
    <rect x="32" y="16" width="48" height="64" fill="#d97824"/>
    <rect x="48" y="32" width="32" height="48" fill="#f2dfbc"/>

    <!-- KUPING KANAN -->
    <rect x="176" y="16" width="48" height="64" fill="#d97824"/>
    <rect x="176" y="32" width="32" height="48" fill="#f2dfbc"/>

    <!-- BADAN -->
    <rect x="64" y="64" width="128" height="80" fill="#d97824"/>
    <rect x="48" y="80" width="160" height="48" fill="#d97824"/>
    <rect x="64" y="128" width="128" height="32" fill="#d97824"/>

    <!-- PERUT -->
    <rect x="80" y="128" width="96" height="48" fill="#f2dfbc"/>
    <rect x="64" y="144" width="128" height="32" fill="#f2dfbc"/>

    <!-- PIXEL PATTERN -->
    <rect x="96"  y="80"  width="16" height="16" fill="#f2dfbc"/>
    <rect x="112" y="96"  width="16" height="16" fill="#f2dfbc"/>
    <rect x="96"  y="112" width="16" height="16" fill="#f2dfbc"/>
    <rect x="128" y="112" width="32" height="16" fill="#f2dfbc"/>

    <!-- MATA KIRI — hitam, static -->
    <rect x="80"  y="128" width="16" height="32" fill="#050505"/>
    <!-- MATA KANAN — hitam, static -->
    <rect x="160" y="128" width="16" height="32" fill="#050505"/>
    <!-- AKSESORI BAWAH -->
    <rect x="112" y="160" width="32" height="16" fill="#050505"/>

    <!-- KELOPAK MATA KIRI -->
    <rect x="80" y="128" width="16" height="0" fill="#f2dfbc">
      <animate
        attributeName="height"
        values="0; 0; 32; 32; 0; 0"
        keyTimes="0; 0.68; 0.72; 0.82; 0.88; 1"
        dur="5s"
        repeatCount="indefinite"
        calcMode="spline"
        keySplines="
          0.4 0 0.6 1;
          0.2 0 0.3 1;
          0.4 0 0.6 1;
          0.25 0 0.4 1;
          0.4 0 0.6 1
        "
      />
    </rect>

    <!-- KELOPAK MATA KANAN -->
    <rect x="160" y="128" width="16" height="0" fill="#f2dfbc">
      <animate
        attributeName="height"
        values="0; 0; 32; 32; 0; 0"
        keyTimes="0; 0.68; 0.72; 0.82; 0.88; 1"
        dur="5s"
        repeatCount="indefinite"
        calcMode="spline"
        keySplines="
          0.4 0 0.6 1;
          0.2 0 0.3 1;
          0.4 0 0.6 1;
          0.25 0 0.4 1;
          0.4 0 0.6 1
        "
      />
    </rect>

  </g>
</svg>
