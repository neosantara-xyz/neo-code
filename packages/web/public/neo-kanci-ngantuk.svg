<svg xmlns="http://www.w3.org/2000/svg" width="256" height="208" viewBox="0 0 256 208" role="img" aria-label="Neo Kanci - Ngantuk">
  <rect width="256" height="208" fill="none"/>

  <!--
    EKSPRESI: NGANTUK
    - Kelopak setengah menutup terus (height=16, setengah dari 32)
    - Kedip berat lambat: nutup penuh, lama pejam, buka pelan
    - Siklus 4s
  -->

  <g shape-rendering="crispEdges">

    <!-- KUPING KIRI -->
    <rect x="32" y="16" width="48" height="64" fill="#d97824"/>
    <rect x="48" y="32" width="32" height="48" fill="#f2dfbc"/>

    <!-- KUPING KANAN -->
    <rect x="176" y="16" width="48" height="64" fill="#d97824"/>
    <rect x="176" y="32" width="32" height="48" fill="#f2dfbc"/>

    <!-- BADAN -->
    <rect x="64" y="64" width="128" height="80" fill="#d97824"/>
    <rect x="48" y="80" width="160" height="48" fill="#d97824"/>
    <rect x="64" y="128" width="128" height="32" fill="#d97824"/>

    <!-- PERUT -->
    <rect x="80" y="128" width="96" height="48" fill="#f2dfbc"/>
    <rect x="64" y="144" width="128" height="32" fill="#f2dfbc"/>

    <!-- PIXEL PATTERN -->
    <rect x="96"  y="80"  width="16" height="16" fill="#f2dfbc"/>
    <rect x="112" y="96"  width="16" height="16" fill="#f2dfbc"/>
    <rect x="96"  y="112" width="16" height="16" fill="#f2dfbc"/>
    <rect x="128" y="112" width="32" height="16" fill="#f2dfbc"/>

    <!-- MATA -->
    <rect x="80"  y="128" width="16" height="32" fill="#050505"/>
    <rect x="160" y="128" width="16" height="32" fill="#050505"/>
    <rect x="112" y="160" width="32" height="16" fill="#050505"/>

    <!--
      Kelopak ngantuk:
      - Baseline = 16 (setengah tutup, ngantuk)
      - Kedip berat: 16 → 32 (pejam) → tahan lama → 16 lagi
      Siklus 4s:
        0.00–0.50 : setengah tutup (h=16) — ngantuk diam
        0.50–0.58 : menutup penuh (h→32)
        0.58–0.80 : PEJAM lama (h=32)
        0.80–0.95 : buka berat-berat (h→16)
        0.95–1.00 : setengah tutup lagi
    -->
    <rect x="80" y="128" width="16" height="16" fill="#f2dfbc">
      <animate attributeName="height"
        values="16; 16; 32; 32; 16; 16"
        keyTimes="0; 0.50; 0.58; 0.80; 0.95; 1"
        dur="4s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.4 0 0.6 1; 0.2 0 0.3 1; 0.4 0 0.6 1; 0.1 0 0.3 1; 0.4 0 0.6 1"/>
    </rect>
    <rect x="160" y="128" width="16" height="16" fill="#f2dfbc">
      <animate attributeName="height"
        values="16; 16; 32; 32; 16; 16"
        keyTimes="0; 0.50; 0.58; 0.80; 0.95; 1"
        dur="4s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.4 0 0.6 1; 0.2 0 0.3 1; 0.4 0 0.6 1; 0.1 0 0.3 1; 0.4 0 0.6 1"/>
    </rect>
  </g>
</svg>
